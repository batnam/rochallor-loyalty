<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="994px" preserveAspectRatio="none" style="width:423px;height:994px;background:#FFFFFF;" version="1.1" viewBox="0 0 423 994" width="423px" zoomAndPan="magnify"><?plantuml 1.2026.4?><defs/><g><g class="title" data-source-line="1743"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="375.0264" x="20.6522" y="23.5352">Security Reference Architecture &#8212; Defense in Depth</text></g><!--entity Perimeter--><g class="entity" data-qualified-name="Perimeter" data-source-line="1751" id="ent0001"><rect fill="#FFF3E0" height="69.4648" rx="2.5" ry="2.5" style="stroke:#BF360C;stroke-width:0.5;" width="185.1768" x="198.43" y="44.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="55.043" x="263.4969" y="68.0234">&#171;Layer&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="69.7266" x="208.43" y="84.5117">Perimeter</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="165.1768" x="208.43" y="101">(AWS WAF, CloudFront)</text></g><!--entity Gateway--><g class="entity" data-qualified-name="Gateway" data-source-line="1752" id="ent0002"><rect fill="#FFF3E0" height="102.4414" rx="2.5" ry="2.5" style="stroke:#BF360C;stroke-width:0.5;" width="236.6309" x="172.7" y="174.9583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="55.043" x="263.4939" y="198.4934">&#171;Layer&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="61.0176" x="182.7" y="214.9817">Gateway</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="133.3896" x="182.7" y="231.47">(AWS API Gateway,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="197.3398" x="182.7" y="247.9583">OAuth 2.0 / JWT validation,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="216.6309" x="182.7" y="264.4466">rate limiting, request logging)</text></g><!--entity Mesh--><g class="entity" data-qualified-name="Mesh" data-source-line="1753" id="ent0003"><rect fill="#FFF3E0" height="85.9531" rx="2.5" ry="2.5" style="stroke:#BF360C;stroke-width:0.5;" width="238.4561" x="77.79" y="338.3983"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="55.043" x="169.4965" y="361.9334">&#171;Layer&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="150.2334" x="87.79" y="378.4217">Service Mesh / mTLS</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="218.4561" x="87.79" y="394.91">(mutual TLS between services,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="167.043" x="87.79" y="411.3983">cert-manager rotation)</text></g><!--entity App--><g class="entity" data-qualified-name="App" data-source-line="1754" id="ent0004"><rect fill="#FFF3E0" height="118.9297" rx="2.5" ry="2.5" style="stroke:#BF360C;stroke-width:0.5;" width="300.0479" x="23.99" y="485.3483"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="55.043" x="146.4924" y="508.8834">&#171;Layer&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="82.0107" x="33.99" y="525.3717">Application</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="280.0479" x="33.99" y="541.86">(RBAC via Authentication Service roles,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="234.8691" x="33.99" y="558.3483">Maker-Checker for adjustments,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="229.3799" x="33.99" y="574.8366">input validation, tx-PIN re-auth</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="206.3086" x="33.99" y="591.3248">for high-value redemptions)</text></g><!--entity Data--><g class="entity" data-qualified-name="Data" data-source-line="1755" id="ent0005"><rect fill="#FFF3E0" height="118.9297" rx="2.5" ry="2.5" style="stroke:#BF360C;stroke-width:0.5;" width="246.0371" x="7" y="665.2783"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="55.043" x="102.4971" y="688.8134">&#171;Layer&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="33.2363" x="17" y="705.3017">Data</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="224.54" x="17" y="721.79">(managed-Postgres encryption</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="104.0088" x="17" y="738.2783">at rest &#8212; KMS,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="126.3828" x="17" y="754.7666">TLS 1.3 in transit,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="226.0371" x="17" y="771.2548">no PII duplicated from the HBP)</text></g><!--entity Audit--><g class="entity" data-qualified-name="Audit" data-source-line="1756" id="ent0006"><rect fill="#FFF3E0" height="118.9297" rx="2.5" ry="2.5" style="stroke:#BF360C;stroke-width:0.5;" width="204.1875" x="203.92" y="861.2083"/><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="55.043" x="278.4923" y="884.7434">&#171;Layer&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="138.0176" x="213.92" y="901.2317">Audit &amp; Monitoring</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="181.084" x="213.92" y="917.72">(immutable Point Ledger,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="156.126" x="213.92" y="934.2083">per-service audit log,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="178.2402" x="213.92" y="950.6966">fraud velocity consumer,</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="184.1875" x="213.92" y="967.1848">SIEM integration via Loki)</text></g><!--link Perimeter to Gateway--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="1758" id="lnk7"><path d="M291.02,114.2083 C291.02,132.1983 291.02,149.6483 291.02,169.6383" fill="none" id="Perimeter-to-Gateway" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="291.02,174.6383,295.02,165.6383,291.02,169.6383,287.02,165.6383,291.02,174.6383" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link Gateway to Mesh--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="1759" id="lnk8"><path d="M259.98,277.7583 C248,297.2883 237.065,315.1066 225.615,333.7666" fill="none" id="Gateway-to-Mesh" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="223,338.0283,231.1163,332.4493,225.615,333.7666,224.2977,328.2653,223,338.0283" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link Mesh to App--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="1760" id="lnk9"><path d="M190.98,424.7883 C188.35,443.1983 185.9454,460.1083 183.1054,480.0383" fill="none" id="Mesh-to-App" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="182.4,484.9883,187.6297,476.6426,183.1054,480.0383,179.7097,475.514,182.4,484.9883" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link App to Data--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="1761" id="lnk10"><path d="M159.49,604.5683 C154.68,623.9983 150.5415,640.7648 145.7315,660.1948" fill="none" id="App-to-Data" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="144.53,665.0483,150.5755,657.2732,145.7315,660.1948,142.8099,655.3508,144.53,665.0483" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link Data to Audit--><g class="link" data-entity-1="ent0005" data-entity-2="ent0006" data-link-type="dependency" data-source-line="1762" id="lnk11"><path d="M145.55,784.4883 C151.71,800.7383 160.01,817.6183 171.02,831.2083 C180.37,842.7483 187.7091,850.2056 199.6891,859.6856" fill="none" id="Data-to-Audit" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="203.61,862.7883,199.0345,854.0667,199.6891,859.6856,194.0703,860.3402,203.61,862.7883" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.2944" x="172.02" y="827.7766">all access logged</text></g><!--link App to Audit--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="dependency" data-source-line="1763" id="lnk12"><path d="M232.42,604.7683 C247.27,622.8583 261.66,643.7083 271.02,665.2783 C298.39,728.3683 305.3559,802.7898 306.6759,855.9598" fill="none" id="App-to-Audit" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="306.8,860.9583,310.5754,851.8618,306.6759,855.9598,302.5779,852.0603,306.8,860.9583" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link Gateway to Audit--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="1764" id="lnk13"><path d="M336.54,277.8783 C357.17,306.0283 377.02,342.8583 377.02,380.3683 C377.02,380.3683 377.02,380.3683 377.02,725.7483 C377.02,773.2483 360.1996,819.0381 341.8496,856.4981" fill="none" id="Gateway-to-Audit" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/><polygon fill="#181818" points="339.65,860.9883,347.2014,854.6656,341.8496,856.4981,340.017,851.1463,339.65,860.9883" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><?plantuml-src PLF1RjD04BtxAqQjX42gGw4I1rH5Sj8Q0WbOTQLUUjdQ4tl9UjUCPrCYXCH7y8Ly2RERa8PmIEoTUVlUp9inQpO89LQUD6_W1fT8Q2k4ZAfMCrRi2U7tprzm9Iax86WhhpstIJAijEqLgGv8SCesmlGz0PYeQjMGyxQUEkFeydAkDaZZCPpcUNvnVHuWZcgac8RJINxnvdmgqTnPBdaZD0_ErCcF97aYFYcGT8UCT6-VPtSbt6Nv6KoDytLESk_52Jm9gG7sy4EETuhnKMrs35anWrtaxDv-pZoty7fq3Y_Xmzqjh9NHjMBjh2H9O61qfrdRvapw_UfnO32kQIHmhBqZFLGkaTPQR5tWq8f0TpilfOhEirS6v00Fo8-85eOjS13H2edJJbdL804vZiKSQmN2Gw6ixusk8bG4RYRP5DPQGMWEBUyoyBSSSYPABTGAAPssMCaJbZ8LLN_n0tTo9-Hbq9uFBG7-bXQpJ-94geJwteOxhMxQL41UYB76hW_GuRXYgV2mu2l5AbWH-wpJmWtS40uWMqYRVjk7OY4KlyCUVboKKb2mxDNe8cmZaxA3PWbQ1yLi1hNVMe0rBCbr89t3-qbnN4SG_iSvNsk6Px1mLhCZcQkKfJkPaNgGVE6qPPXZBTCGhLxysiqALBmfoo3n9Sa9rcXS5JweIWpmNRnHpguNKYzZGziXXBdCtKh_Pr2WIvBz1aEQZlSxjNl6M9