name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".github/workflows/ci.yml"

jobs:
  build:
    name: Build & Test (${{ matrix.service }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - loyalty-integration-bridge
          - loyalty-core
          - loyalty-earning
          - loyalty-redemption
          - loyalty-campaign
          - loyalty-admin-bff
          - loyalty-mobile-bff

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Test
        working-directory: src/${{ matrix.service }}
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: src/${{ matrix.service }}/build/reports/tests/
          retention-days: 7
