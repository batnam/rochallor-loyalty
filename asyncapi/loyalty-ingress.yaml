asyncapi: '2.6.0'
info:
  title: Loyalty Integration Contract — Inbound (Host Bank → Loyalty)
  version: '0.1.0'
  description: |
    **Producer obligations & hand-off guide: [`INGRESS-CONTRACT.md`](INGRESS-CONTRACT.md)** — read it first.

    The **Loyalty-authored** inbound integration contract. Unlike `external-consumed.yaml`
    (which *documented* a bank's native stream as producer-owned reference), the channels here
    are **owned and versioned by the Loyalty platform**, and every Host Bank deployment is
    responsible for producing events that conform to them.

    **How a bank integrates.** The Host Bank builds a **bank-side adapter** (outside the Loyalty
    repo, owned by the deployment/integration team) that consumes the bank's native stream — e.g.
    HBP's `ph.transaction.transaction-event`
    ([`deployments/hbp/asyncapi/transaction-events.asyncapi.yaml`](../../deployments/hbp/asyncapi/transaction-events.asyncapi.yaml))
    — and emits events on these channels. The adapter owns the bank-specific concerns the
    platform deliberately refuses to absorb: de-duplicating multi-`step` events down to the single
    settled event, resolving `accountNumber → customerId`, and propagating `traceparent`.

    **Two-layer ingress.**
    These `loyalty.ingress.*` channels are **Layer 1** (bank-facing, one channel per earn source,
    self-describing — the bank need not know Loyalty's `earn_source_code` taxonomy).
    `loyalty-integration-bridge` validates each ingress event against its JSON Schema (failure → a
    per-channel DLQ), stamps the canonical
    `source`, and re-emits the internal **Layer 2** canonical event `loyalty.earn.translated.v1`
    ([`loyalty-integration-bridge.yaml`](loyalty-integration-bridge.yaml)) which `loyalty-earning`
    consumes unchanged.

    **Customer-scoped, not member-scoped.** Ingress events
    carry **`customerId`** and are **keyed on `customerId`** — **no `memberId`, no `programId`**.
    The Bridge does not resolve members or programs; `loyalty-earning` resolves
    `customerId → Member(s)` and broadcasts to every enrolled Program
    (v1 is single-Program, so 1:1).

    **A note on PII.** These channels carry `customerId` only — never PAN, card last-4, name, phone,
    or NRC (the platform's PII boundary; see CONTEXT.md). A bank-side adapter that has such fields
    must drop them before producing here.

    Serialization: JSON (Spring Kafka `JsonSerializer`/`JsonDeserializer`),
    JSON Schema, no registry.
  contact:
    name: Loyalty Platform —  (contract owner)
defaultContentType: application/json

servers:
  msk:
    url: b-1.loyalty-msk.<region>.amazonaws.com:9094
    protocol: kafka-secure
    description: Shared RDB MSK cluster. The bank-side adapter produces here over mTLS.
    security:
      - mtls: []

channels:
  loyalty.ingress.card_spend.v1:
    description: |
      A **settled** card purchase (POS or e-commerce). One event per settled transaction — the
      bank-side adapter must emit exactly once at settlement (authorizations and intermediate
      processing steps are NOT earnable; pre-settle pending balances are explicitly out of scope).
      The Bridge stamps
      canonical `source = CARD_SPEND` (constant for this channel — no discriminator) and re-emits
      `loyalty.earn.translated.v1`.
    parameters:
      customerId: { $ref: '#/components/parameters/customerId' }
    publish:
      operationId: onCardSpendSettled
      summary: The Host Bank adapter produces; loyalty-integration-bridge consumes and validates.
      message:
        $ref: '#/components/messages/CardSpend'

  loyalty.ingress.payment.v1:
    description: |
      A **completed non-card payment** (bill payment, fund transfer, P2P, QR merchant payment, top-up).
      One channel for the whole payment family, discriminated by a **canonical `paymentType`**
      (a two-level shape, Loyalty-owned). The bank-side adapter maps its native transaction types to this canonical
      `paymentType` — it does **not** need to know Loyalty's `earn_source_code` taxonomy.

      The Bridge applies a **bank-uniform** `paymentType → earn_source` map (Loyalty-owned config):
      `BILL_PAYMENT→BILL_PAYMENT`; `FUND_TRANSFER`/`P2P_TRANSFER`/`QR_PAYMENT`→`FUND_TRANSFER`;
      `TOPUP→TOPUP`; `OTHER` (and any unmapped canonical value) → `PAYMENT_COMPLETED` (inactive,
      `EMIT_FALLBACK_AND_ALERT`). The canonical `paymentType` is **preserved on the EarnEvent payload**
      so DSL rules under `FUND_TRANSFER` can discriminate (e.g. exclude `P2P_TRANSFER` to defend
      against self-transfer farming).
    parameters:
      customerId: { $ref: '#/components/parameters/customerId' }
    publish:
      operationId: onPaymentCompleted
      summary: The Host Bank adapter produces; loyalty-integration-bridge consumes and validates.
      message:
        $ref: '#/components/messages/Payment'

  loyalty.ingress.reversal.v1:
    description: |
      A reversal/refund of a prior earn-bearing transaction. The Bridge translates it to the canonical
      `loyalty.payment.reversed.v1`; **clawback itself is core-driven** —
      `loyalty-core` reverses every ledger entry whose `source_ref` matches `originalEventId`. The
      Bridge does no stream-join and writes no Ledger. Customer-scoped.
    parameters:
      customerId: { $ref: '#/components/parameters/customerId' }
    publish:
      operationId: onReversal
      summary: The Host Bank adapter produces; loyalty-integration-bridge consumes and validates.
      message:
        $ref: '#/components/messages/Reversal'

  loyalty.ingress.customer_lifecycle.v1:
    description: |
      A customer-lifecycle change (v1: customer closed). Translated to canonical
      `loyalty.member.lifecycle.v1` consumed by `loyalty-core`. Customer-scoped (a Member may not exist).
    parameters:
      customerId: { $ref: '#/components/parameters/customerId' }
    publish:
      operationId: onCustomerLifecycle
      summary: The Host Bank adapter produces; loyalty-integration-bridge consumes and validates.
      message:
        $ref: '#/components/messages/CustomerLifecycle'

components:
  securitySchemes:
    mtls:
      type: X509
      description: Bank-adapter-to-MSK mutual TLS.

  parameters:
    customerId:
      description: Partition key — ingress events are partitioned by customerId (member is not yet resolved).
      schema: { type: integer, format: int64 }

  messages:
    CardSpend:
      name: CardSpend
      messageId: CardSpend
      title: Settled Card Spend (ingress)
      summary: A settled card purchase the bank-side adapter reports to Loyalty.
      headers: { $ref: '#/components/schemas/IngressHeaders' }
      payload:
        $ref: '#/components/schemas/CardSpendPayload'
      examples:
        - name: pos-usd
          summary: A USD POS purchase.
          payload:
            eventId: "hbp:cardspend:TXN20260529000789"
            customerId: 100990001
            occurredAt: "2026-05-29T10:30:00Z"
            amount: 42.50
            currency: "USD"
            mcc: "5411"
            merchantId: "M00012345"
            schemaVersion: 1

    Payment:
      name: Payment
      messageId: Payment
      title: Completed Payment (ingress)
      summary: A completed non-card payment the bank-side adapter reports to Loyalty.
      headers: { $ref: '#/components/schemas/IngressHeaders' }
      payload:
        $ref: '#/components/schemas/PaymentPayload'
      examples:
        - name: p2p-vnd
          summary: A VND P2P transfer (excluded from earning by DSL).
          payload:
            eventId: "hbp:payment:TXN20260529000901"
            customerId: 100990001
            occurredAt: "2026-05-29T11:00:00Z"
            amount: 50000.0
            currency: "VND"
            paymentType: "P2P_TRANSFER"
            recipientRelationship: "OTHER_CUSTOMER"
            schemaVersion: 1
        - name: bill-usd
          summary: A USD utility bill payment.
          payload:
            eventId: "hbp:payment:TXN20260529000902"
            customerId: 100990002
            occurredAt: "2026-05-29T11:05:00Z"
            amount: 12.00
            currency: "USD"
            paymentType: "BILL_PAYMENT"
            billerCategory: "UTILITY"
            schemaVersion: 1

    Reversal:
      name: Reversal
      messageId: Reversal
      title: Reversal (ingress)
      summary: A reversal/refund the bank-side adapter reports to Loyalty.
      headers: { $ref: '#/components/schemas/IngressHeaders' }
      payload:
        $ref: '#/components/schemas/ReversalPayload'
      examples:
        - name: refund
          payload:
            eventId: "hbp:reversal:RV20260529000045"
            customerId: 100990001
            occurredAt: "2026-05-30T09:00:00Z"
            originalEventId: "hbp:cardspend:TXN20260529000789"
            reversalEventId: "RV20260529000045"
            amount: 42.50
            currency: "USD"
            schemaVersion: 1

    CustomerLifecycle:
      name: CustomerLifecycle
      messageId: CustomerLifecycle
      title: Customer Lifecycle (ingress)
      summary: A customer-lifecycle change the bank-side adapter reports to Loyalty.
      headers: { $ref: '#/components/schemas/IngressHeaders' }
      payload:
        $ref: '#/components/schemas/CustomerLifecyclePayload'
      examples:
        - name: closed
          payload:
            eventId: "hbp:lifecycle:CL20260529000003"
            customerId: 100990001
            occurredAt: "2026-05-30T10:00:00Z"
            lifecycleType: "CUSTOMER_CLOSED"
            reason: "CUSTOMER_REQUEST"
            schemaVersion: 1

  schemas:
    IngressHeaders:
      type: object
      required: [traceparent, source]
      properties:
        traceparent:
          type: string
          description: |
            W3C trace context, propagated by the bank-side adapter from the originating banking
            transaction so one distributed trace spans bank → Bridge → earning → core. The adapter
            must set this; the Bridge forwards it onto the canonical event.
        source:
          type: string
          example: "hbp-paymenthub"
          description: Producing-system identifier of the bank-side adapter (deployment-scoped).

    CardSpendPayload:
      type: object
      required: [eventId, customerId, occurredAt, amount, currency, schemaVersion]
      properties:
        eventId:
          type: string
          description: |
            Bank-stable, globally-unique idempotency key for this settled spend. Carried through to
            the canonical event's `eventId`; downstream dedups on it. The adapter must guarantee the
            same settled transaction always yields the same eventId (so step-event de-duplication and
            adapter retries are idempotent).
          example: "hbp:cardspend:TXN20260529000789"
        customerId:
          type: integer
          format: int64
          description: Bank CIF / customer identifier. Required — resolves the bank-native "no customerId" gap.
          example: 100990001
        occurredAt:
          type: string
          format: date-time
          description: Settlement timestamp (the earn occurs at settlement, not authorization).
          example: "2026-05-29T10:30:00Z"
        amount:
          type: number
          format: double
          description: Settled amount in `currency`, from the customer's debited perspective. No FX normalisation.
          example: 42.50
        currency:
          type: string
          description: Debited account currency. USD and VND are both first-class (Cambodia dual-currency market).
          enum: [USD, VND]
          example: "USD"
        mcc:
          type: string
          nullable: true
          description: Merchant category code (ISO 18245), if known. Lets DSL rules discriminate by merchant category.
          example: "5411"
        merchantId:
          type: string
          nullable: true
          description: Acquirer/merchant identifier, if known.
          example: "M00012345"
        schemaVersion:
          type: integer
          description: In-payload schema revision. 1 at launch.
          example: 1

    PaymentPayload:
      type: object
      required: [eventId, customerId, occurredAt, amount, currency, paymentType, schemaVersion]
      properties:
        eventId:
          type: string
          description: Bank-stable, globally-unique idempotency key for this completed payment. Carried through to the canonical event's eventId.
          example: "hbp:payment:TXN20260529000901"
        customerId:
          type: integer
          format: int64
          description: Bank CIF / customer identifier (the payer — the customer being debited).
          example: 100990001
        occurredAt:
          type: string
          format: date-time
          description: Completion timestamp.
          example: "2026-05-29T11:00:00Z"
        amount:
          type: number
          format: double
          description: Debited amount in `currency`, customer's perspective. No FX normalisation.
          example: 50000.0
        currency:
          type: string
          enum: [USD, VND]
          example: "VND"
        paymentType:
          type: string
          description: |
            Canonical Loyalty payment-type discriminator. The bank-side adapter maps its
            native transaction types onto this vocabulary. The Bridge routes it to an `earn_source`
            (bank-uniform map) and preserves it on the EarnEvent payload for DSL discrimination. A
            value outside this enum is a contract violation → DLQ; `OTHER` (and any canonical value not
            in the routing map) routes to the inactive `PAYMENT_COMPLETED` fallback (EMIT_FALLBACK_AND_ALERT).
          enum: [BILL_PAYMENT, FUND_TRANSFER, P2P_TRANSFER, QR_PAYMENT, TOPUP, OTHER]
          example: "P2P_TRANSFER"
        billerCategory:
          type: string
          nullable: true
          description: For BILL_PAYMENT — biller category (e.g. UTILITY, TELECOM, TAX). Open-ended; lets DSL target categories.
          example: "UTILITY"
        recipientRelationship:
          type: string
          nullable: true
          enum: [OWN_ACCOUNT, OWN_CUSTOMER, OTHER_CUSTOMER, EXTERNAL_BANK]
          description: For transfers — relationship of the recipient to the payer. Anti-self-transfer-farming signal for FUND_TRANSFER.
          example: "OTHER_CUSTOMER"
        topupTarget:
          type: string
          nullable: true
          enum: [MOBILE_AIRTIME, E_WALLET, PREPAID_CARD]
          description: For TOPUP — top-up target, if known.
          example: "MOBILE_AIRTIME"
        merchantId:
          type: string
          nullable: true
          description: For QR_PAYMENT — merchant identifier, if known.
        schemaVersion:
          type: integer
          description: In-payload schema revision. 1 at launch.
          example: 1

    ReversalPayload:
      type: object
      required: [eventId, customerId, occurredAt, originalEventId, reversalEventId, schemaVersion]
      properties:
        eventId:
          type: string
          description: Bank-stable idempotency key for this reversal.
          example: "hbp:reversal:RV20260529000045"
        customerId:
          type: integer
          format: int64
        occurredAt:
          type: string
          format: date-time
        originalEventId:
          type: string
          description: eventId of the earn event being reversed; loyalty-core matches source_ref on it.
          example: "hbp:cardspend:TXN20260529000789"
        reversalEventId:
          type: string
          example: "RV20260529000045"
        amount:
          type: number
          format: double
          nullable: true
        currency:
          type: string
          enum: [USD, VND]
          nullable: true
        schemaVersion:
          type: integer
          example: 1

    CustomerLifecyclePayload:
      type: object
      required: [eventId, customerId, occurredAt, lifecycleType, schemaVersion]
      properties:
        eventId:
          type: string
          example: "hbp:lifecycle:CL20260529000003"
        customerId:
          type: integer
          format: int64
        occurredAt:
          type: string
          format: date-time
        lifecycleType:
          type: string
          enum: [CUSTOMER_CLOSED]
          description: Canonical lifecycle type. v1 ships CUSTOMER_CLOSED.
          example: "CUSTOMER_CLOSED"
        reason:
          type: string
          nullable: true
        schemaVersion:
          type: integer
          example: 1
