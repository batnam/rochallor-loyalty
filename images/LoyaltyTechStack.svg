<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="847px" preserveAspectRatio="none" style="width:1341px;height:847px;background:#FFFFFF;" version="1.1" viewBox="0 0 1341 847" width="1341px" zoomAndPan="magnify"><?plantuml 1.2026.4?><defs/><g><g class="title" data-source-line="1574"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="245.4033" x="544.7226" y="23.5352">Technology Stack &#8212; Layered View</text></g><!--entity L1--><g class="entity" data-qualified-name="L1" data-source-line="1587" id="ent0001"><rect fill="#FFE0B2" height="85.9531" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="429.2813" x="652.47" y="44.4883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="851.617" y="68.0234">&#171;L1&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="107.0645" x="662.47" y="84.5117">L1 &#8212; Channels</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="125.6787" x="773.9641" y="84.5117">(Reused from HBP)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="335.6377" x="662.47" y="101">&#8226; Mobile Banking App (Flutter &#8212; hosts Loyalty UI)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="409.2813" x="662.47" y="117.4883">&#8226; BEP (Bank Employee Portal &#8212; hosts Loyalty admin screens)</text></g><!--entity L2--><g class="entity" data-qualified-name="L2" data-source-line="1589" id="ent0002"><rect fill="#FFF9C4" height="85.9531" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="765.2266" x="484.49" y="191.4383"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="851.6096" y="214.9734">&#171;L2&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="156.3994" x="494.49" y="231.4617">L2 &#8212; Edge &amp; Gateway</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="196.2666" x="494.49" y="247.95">&#8226; AWS API Gateway (existing)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="745.2266" x="494.49" y="264.4383">&#8226; Authentication Service &#8212; Customer + business-employee-portal realms; transaction-PIN step-up (existing)</text></g><!--entity L3--><g class="entity" data-qualified-name="L3" data-source-line="1591" id="ent0003"><rect fill="#C8E6C9" height="118.9297" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="434.2305" x="649.99" y="338.3883"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="851.6116" y="361.9234">&#171;L3&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="242.7031" x="659.99" y="378.4117">L3 &#8212; Loyalty Application Services</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="173.209" x="659.99" y="394.9">&#8226; Java 21 + Spring Boot 4</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="414.2305" x="659.99" y="411.3883">&#8226; Services: loyalty-core, loyalty-earning, loyalty-redemption,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="310.6113" x="668.8494" y="427.8766">loyalty-campaign, loyalty-integration-bridge,</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="256.7783" x="668.8494" y="444.3648">loyalty-mobile-bff, loyalty-admin-bff</text></g><!--entity L4--><g class="entity" data-qualified-name="L4" data-source-line="1593" id="ent0004"><rect fill="#BBDEFB" height="102.4414" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="288.2148" x="7" y="518.3183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="135.6138" y="541.8534">&#171;L4&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="217.3555" x="17" y="558.3417">L4 &#8212; Integration &amp; Messaging</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="260.7979" x="17" y="574.83">&#8226; Apache Kafka (shared MSK with HBP)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="268.2148" x="17" y="591.3183">&#8226; OpenAPI 3.x (REST contracts for BFFs)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="217.1982" x="17" y="607.8066">&#8226; AsyncAPI 2.x (Event contracts)</text></g><!--entity L5--><g class="entity" data-qualified-name="L5" data-source-line="1595" id="ent0005"><rect fill="#E1BEE7" height="102.4414" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="484.2559" x="329.98" y="518.3183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="556.6143" y="541.8534">&#171;L5&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="227.7393" x="339.98" y="558.3417">L5 &#8212; Workflow &amp; Orchestration</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="409.4316" x="339.98" y="574.83">&#8226; Spring scheduling for nightly Expiry / Tier-evaluation jobs</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="464.2559" x="339.98" y="591.3183">&#8226; Saga-pattern within loyalty-redemption (in-process orchestration)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="311.5" x="339.98" y="607.8066">&#8226; Reservation TTL sweeper (Spring scheduled)</text></g><!--entity L6--><g class="entity" data-qualified-name="L6" data-source-line="1597" id="ent0006"><rect fill="#FFCDD2" height="102.4414" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="389.5371" x="849.34" y="518.3183"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="1028.6149" y="541.8534">&#171;L6&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="73.8418" x="859.34" y="558.3417">L6 &#8212; Data</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="369.5371" x="859.34" y="574.83">&#8226; PostgreSQL (RDS &#8212; one instance per service, 4 total)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="356.2412" x="859.34" y="591.3183">&#8226; Redis (ElastiCache &#8212; read-through cache for BFFs)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="330.75" x="859.34" y="607.8066">&#8226; Object storage (S3) &#8212; for reward voucher PDFs</text></g><!--entity L7--><g class="entity" data-qualified-name="L7" data-source-line="1599" id="ent0007"><rect fill="#B0BEC5" height="151.9063" rx="2.5" ry="2.5" style="stroke:#424242;stroke-width:0.5;" width="467.5352" x="530.34" y="681.7583"/><text fill="#000000" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="30.9873" x="748.6139" y="705.2934">&#171;L7&#187;</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="218.5791" x="540.34" y="721.7817">L7 &#8212; Platform &amp; Observability</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="397.4961" x="540.34" y="738.27">&#8226; AWS EKS &#8212; dedicated Loyalty cluster (sister to the HBP's)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="381.459" x="540.34" y="754.7583">&#8226; Helm + ArgoCD &#8212; GitOps deployment (matching HBP)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="264.7832" x="540.34" y="771.2466">&#8226; GitLab &#8212; source + CI (matching HBP)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="328.4531" x="540.34" y="787.7348">&#8226; Loki &#8212; logs; Prometheus + Thanos &#8212; metrics;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="438.6758" x="549.1994" y="804.2231">Grafana &#8212; dashboards; OpenTelemetry &#8212; traces (matching HBP)</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="429.4609" x="540.34" y="820.7114">&#8226; AWS KMS / Secrets Manager &#8212; keys &amp; secrets (matching HBP)</text></g><!--link L1 to L2--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="1601" id="lnk8"><path d="M867.11,130.7783 C867.11,149.7483 867.11,167.0683 867.11,186.0483" fill="none" id="L1-to-L2" style="stroke:#181818;stroke-width:1;"/><polygon fill="#181818" points="867.11,191.0483,871.11,182.0483,867.11,186.0483,863.11,182.0483,867.11,191.0483" style="stroke:#181818;stroke-width:1;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link L2 to L3--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-lin