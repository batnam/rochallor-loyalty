spring:
  application:
    name: loyalty-core
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/loyalty_core}
    username: ${DB_USER:loyalty}
    password: ${DB_PASSWORD:loyalty}
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate only validates the mapping
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: loyalty-core
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
    listener:
      ack-mode: record

# Canonical channel names. A deployment may override via env/config. Producer topics mirror the
# names the bridge already publishes/consumes (loyalty.member.lifecycle.v1 is the bridge -> core edge).
core:
  topics:
    member-lifecycle: loyalty.member.lifecycle.v1     # consumed (from loyalty-integration-bridge)
    payment-reversed: loyalty.payment.reversed.v1     # consumed (from loyalty-integration-bridge)
    ledger-events: loyalty.ledger.v1                  # produced (PointsEarned/Redeemed/Expired ...)
    member-events: loyalty.member.v1                  # produced (MemberClosed/TierChanged ...)
  reservation:
    default-ttl-seconds: 900                          # 15 min (CONTEXT.md "Reservation")
  expiry:
    # nightly per-Program expiry sweep; cron in server TZ. ShedLock-guarded across pods.
    cron: "0 30 2 * * *"
  tier-reeval:
    # nightly per-Program sweep that re-tiers Members as points age out of the Qualifying window
    # (ROLLING_12_MONTHS / CALENDAR_YEAR); LIFETIME programs are skipped. ShedLock-guarded across pods.
    cron: "0 15 3 * * *"
  tcs:
    grace-days: 30                                    # T&Cs re-acceptance grace window (CONTEXT.md "T&Cs Version")
    # nightly sweep that suspends Members whose grace window has elapsed. ShedLock-guarded.
    cron: "0 45 2 * * *"
  outbox:
    relay-batch-size: 100

logging:
  level:
    io.github.batnam.loyalty.core: DEBUG
